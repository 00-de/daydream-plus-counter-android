<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>DayDreamプラス 題目カウンター AOD DX+</title>

<style>

body{
  margin:0;
  padding:20px;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffb6f9,#b5d7ff,#ffe59e);
  min-height:100vh;
  color:#222;
  overflow-x:hidden;
}

h1{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
}

.card{
  background:white;
  border-radius:24px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

button{
  border:none;
  padding:14px 18px;
  border-radius:16px;
  margin:6px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.startBtn{
  background:#00c853;
  color:white;
}

.resetBtn{
  background:#ff7043;
  color:white;
}

.saveBtn{
  background:#2979ff;
  color:white;
}

input,textarea{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid #ccc;
  margin-top:8px;
  margin-bottom:14px;
  font-size:16px;
  box-sizing:border-box;
}

.bar{
  height:28px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,#00b0ff,#ff00aa);
  transition:0.5s;
}

.percentText{
  font-size:20px;
  font-weight:bold;
}

.status{
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
}

.running{
  color:#00c853;
}

.stop{
  color:#ff1744;
}

.achievement{
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  background:#fff3cd;
  font-weight:bold;
  animation:pop .6s ease;
  position:relative;
  overflow:hidden;
}

.achievement::after{
  content:"✨";
  position:absolute;
  right:12px;
  top:10px;
  animation:kirakira 1.5s infinite;
}

.big{
  font-size:20px;
  color:#d50000;
}

@keyframes pop{

  0%{
    opacity:0;
    transform:scale(.7);
  }

  100%{
    opacity:1;
    transform:scale(1);
  }

}

@keyframes kirakira{

  0%{
    transform:rotate(0deg) scale(1);
    opacity:1;
  }

  50%{
    transform:rotate(180deg) scale(1.5);
    opacity:.5;
  }

  100%{
    transform:rotate(360deg) scale(1);
    opacity:1;
  }

}

</style>
</head>

<body>

<h1>🌈 DayDreamプラス 題目カウンター DX+</h1>

<div class="card">

<div>
⏰ 現在時刻:
<span id="clock"></span>
</div>

<br>

<div>
🚀 開始時刻:
<span id="startTime">未開始</span>
</div>

<br>

<div>
📅 1日総数:
<span id="daily">0</span>
</div>

<div>
🗓️ 月総数:
<span id="monthly">0</span>
</div>

<div>
🏆 総数:
<span id="total">0</span>
</div>

<div class="status">
状態:
<span id="statusText" class="stop">停止中</span>
</div>

</div>

<div class="card">

<button class="startBtn"
onclick="toggleCounter()"
id="startButton">
▶ 自動開始
</button>

<button class="resetBtn"
onclick="resetDay()">
📅 日リセット
</button>

<button class="resetBtn"
onclick="resetMonth()">
🗓️ 月リセット
</button>

<button class="resetBtn"
onclick="resetTotal()">
🏆 総リセット
</button>

</div>

<div class="card">

<label>⚡ 1分間唱題数</label>

<input
type="number"
id="perMinute"
value="60">

<label>🎯 1日目標</label>

<input
type="number"
id="goal"
value="3000">

<div class="percentText">
📊 達成率:
<span id="percent">0</span>%
</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

</div>

<div class="card">

<h2>🙏 御祈念</h2>

<textarea
id="prayer"
rows="5"
maxlength="200"
placeholder="御祈念を入力してください"></textarea>

<button
class="saveBtn"
onclick="savePrayer()">
💾 保存
</button>

</div>

<div class="card">

<h2>🌈 達成演出</h2>

<div id="achievementArea"></div>

</div>

<!-- 紙吹雪 -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const STORAGE='daydream_dx_final';

let state=
JSON.parse(localStorage.getItem(STORAGE))
||{

  daily:0,
  monthly:0,
  total:0,

  start:null,
  fixedStart:null,

  running:false,

  perMinute:60,

  dailyAchieved:false,

  achievements:[]

};

/* 保存 */
function save(){

  localStorage.setItem(
    STORAGE,
    JSON.stringify(state)
  );

}

/* カウント */
function getCounts(){

  if(!state.running || !state.start){

    return{

      daily:state.daily,
      monthly:state.monthly,
      total:state.total

    };

  }

  const sec=
  (Date.now()-state.start)/1000;

  const add=
  sec*(state.perMinute/60);

  return{

    daily:state.daily+add,
    monthly:state.monthly+add,
    total:state.total+add

  };

}

/* UI更新 */
function updateUI(){

  const c=getCounts();

  document.getElementById('daily').innerText=
  Math.floor(c.daily);

  document.getElementById('monthly').innerText=
  Math.floor(c.monthly);

  document.getElementById('total').innerText=
  Math.floor(c.total);

  if(state.fixedStart){

    document.getElementById('startTime').innerText=
    new Date(state.fixedStart)
    .toLocaleString('ja-JP');

  }

  const goal=
  Number(
    document.getElementById('goal').value||1
  );

  const percent=
  Math.min(
    100,
    Math.floor(c.daily/goal*100)
  );

  document.getElementById('percent').innerText=
  percent;

  document.getElementById('fill').style.width=
  percent+'%';

  checkDailyGoal(c);

  checkAchievements(c.total);

}

/* 開始停止 */
function toggleCounter(){

  state.perMinute=
  Number(
    document.getElementById('perMinute').value||60
  );

  if(!state.running){

    state.running=true;

    state.start=Date.now();

    state.fixedStart=Date.now();

    document.getElementById('statusText').innerText=
    'カウント中';

    document.getElementById('statusText').className=
    'running';

    document.getElementById('startButton').innerText=
    '⏹ 停止';

  }else{

    const c=getCounts();

    state.daily=c.daily;
    state.monthly=c.monthly;
    state.total=c.total;

    state.running=false;

    document.getElementById('statusText').innerText=
    '停止中';

    document.getElementById('statusText').className=
    'stop';

    document.getElementById('startButton').innerText=
    '▶ 自動開始';

  }

  save();

  updateUI();

}

/* 5秒自動保存 */
setInterval(()=>{

  if(state.running){

    const c=getCounts();

    state.daily=c.daily;
    state.monthly=c.monthly;
    state.total=c.total;

    state.start=Date.now();

    save();

  }

},5000);

/* 御祈念保存 */
function savePrayer(){

  localStorage.setItem(
    'prayer',
    document.getElementById('prayer').value
  );

  alert("🙏 御祈念を保存しました");

}

/* 復元 */
document.getElementById('prayer').value='';

/* 演出追加 */
function addAchievement(id,message,big=false){

  if(state.achievements.includes(id)){
    return;
  }

  state.achievements.push(id);

  save();

  const div=document.createElement('div');

  div.className=
  big
  ? 'achievement big'
  : 'achievement';

  div.id=id;

  div.innerHTML=message;

  document
  .getElementById('achievementArea')
  .prepend(div);

  /* Androidバイブ */
  if(navigator.vibrate){

    navigator.vibrate([200,100,200]);

  }

  /* 紙吹雪 */
  confetti({

    particleCount:100,
    spread:70,
    origin:{y:0.6}

  });

}

/* 復元 */
function restoreAchievements(){

  const map={

    dailyGoal:{
      text:'🌅 1日目標達成お疲れ様です。自分を労わって明日からも頑張りましょう(^^)v',
      big:true
    },

    ach10000:{
      text:'🥁 大地：おめでとう～よくやったね☺'
    },

    ach50000:{
      text:'🎀 葵：おめでとう～お疲れ様です(#^.^#)'
    },

    ach100000:{
      text:'🎸 蓮：やったね(^^♪地道に進もう'
    },

    ach200000:{
      text:'🎤 結衣：やった～私の歌で元気を送るね'
    },

    ach500000:{
      text:'🎹 悠真：さすが～未来のリーダー'
    },

    ach750000:{
      text:'✨ 美琴：あともう少しで100万遍'
    },

    ach1000000:{
      text:'🏆 全員：100万遍達成おめでとう！',
      big:true
    }

  };

  state.achievements.forEach(id=>{

    const item=map[id];

    if(!item)return;

    const div=document.createElement('div');

    div.className=
    item.big
    ? 'achievement big'
    : 'achievement';

    div.id=id;

    div.innerHTML=item.text;

    document
    .getElementById('achievementArea')
    .prepend(div);

  });

}

/* 1日達成 */
function checkDailyGoal(c){

  const goal=
  Number(
    document.getElementById('goal').value||1
  );

  if(
    !state.dailyAchieved &&
    c.daily>=goal
  ){

    state.dailyAchieved=true;

    save();

    addAchievement(
      'dailyGoal',
      '🌅 1日目標達成お疲れ様です。自分を労わって明日からも頑張りましょう(^^)v',
      true
    );

  }

}

/* 段階演出 */
function checkAchievements(total){

  if(total>=10000){

    addAchievement(
      'ach10000',
      '🥁 大地：おめでとう～よくやったね☺'
    );

  }

  if(total>=50000){

    addAchievement(
      'ach50000',
      '🎀 葵：おめでとう～お疲れ様です(#^.^#)'
    );

  }

  if(total>=100000){

    addAchievement(
      'ach100000',
      '🎸 蓮：やったね(^^♪地道に進もう'
    );

  }

  if(total>=200000){

    addAchievement(
      'ach200000',
      '🎤 結衣：やった～私の歌で元気を送るね'
    );

  }

  if(total>=500000){

    addAchievement(
      'ach500000',
      '🎹 悠真：さすが～未来のリーダー'
    );

  }

  if(total>=750000){

    addAchievement(
      'ach750000',
      '✨ 美琴：あともう少しで100万遍'
    );

  }

  if(total>=1000000){

    addAchievement(
      'ach1000000',
      '🏆 全員：100万遍達成おめでとう！',
      true
    );

  }

}

/* リセット */
function resetDay(){

  state.daily=0;

  state.dailyAchieved=false;

  state.achievements=[];

  save();

  document
  .getElementById('achievementArea')
  .innerHTML='';

  updateUI();

}

function resetMonth(){

  state.monthly=0;

  save();

  updateUI();

}

function resetTotal(){

  state.total=0;

  state.achievements=[];

  save();

  document
  .getElementById('achievementArea')
  .innerHTML='';

  updateUI();

}

/* 時計 */
setInterval(()=>{

  document.getElementById('clock').innerText=
  new Date().toLocaleString('ja-JP');

  updateUI();

},1000);

/* 演出復元 */
restoreAchievements();

updateUI();

</script>

</body>
</html>
