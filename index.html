<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DayDreamプラス 題目カウンター DX+</title>

<style>
body{
  margin:0;
  padding:20px;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffb6f9,#b5d7ff,#ffe59e);
  min-height:100vh;
  color:#222;
}

h1{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
}

.card{
  background:white;
  border-radius:24px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

button{
  border:none;
  padding:14px 18px;
  border-radius:16px;
  margin:6px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.startBtn{background:#00c853;color:white;}
.resetBtn{background:#ff7043;color:white;}
.saveBtn{background:#2979ff;color:white;}

input,textarea{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid #ccc;
  margin-top:8px;
  margin-bottom:14px;
  font-size:16px;
  box-sizing:border-box;
}

.bar{
  height:28px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00e676,#00b0ff,#ff00aa);
}

.percentText{
  font-size:20px;
  font-weight:bold;
}

.status{
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
}

.running{color:#00c853;}
.stop{color:#ff1744;}

.achievement{
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  background:#fff3cd;
  font-weight:bold;
  animation:fadein .5s;
}

.big{
  font-size:20px;
  color:#d50000;
}

@keyframes fadein{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<h1>🌈 DayDreamプラス 題目カウンター DX+</h1>

<div class="card">
<div>⏰ 現在時刻: <span id="clock"></span></div><br>
<div>🚀 開始時刻: <span id="startTime">未開始</span></div><br>

<div>📅 1日総数: <span id="daily">0</span></div>
<div>🗓️ 月総数: <span id="monthly">0</span></div>
<div>🏆 総数: <span id="total">0</span></div>

<div class="status">状態: <span id="statusText" class="stop">停止中</span></div>
</div>

<div class="card">
<button class="startBtn" onclick="toggleCounter()" id="startButton">▶ 自動開始</button>
<button class="resetBtn" onclick="resetDay()">📅 日リセット</button>
<button class="resetBtn" onclick="resetMonth()">🗓️ 月リセット</button>
<button class="resetBtn" onclick="resetTotal()">🏆 総リセット</button>
</div>

<div class="card">
<label>⚡ 1分間唱題数</label>
<input type="number" id="perMinute" value="60">

<label>🎯 1日目標</label>
<input type="number" id="goal" value="3000">

<div class="percentText">📊 達成率: <span id="percent">0</span>%</div>

<div class="bar"><div class="fill" id="fill"></div></div>
</div>

<div class="card">
<h2>🙏 御祈念</h2>
<textarea id="prayer" rows="5" maxlength="200"></textarea>
<button class="saveBtn" onclick="savePrayer()">💾 保存</button>
</div>

<div class="card">
<h2>🌈 達成演出</h2>
<div id="achievementArea"></div>
</div>

<script>

const STORAGE='daydream_dx_final';

let state = JSON.parse(localStorage.getItem(STORAGE)) || {
  daily:0,
  monthly:0,
  total:0,
  start:null,
  running:false,
  perMinute:60,
  dailyAchieved:false
};

function save(){
  localStorage.setItem(STORAGE,JSON.stringify(state));
}

function getCounts(){

  if(!state.running || !state.start){
    return state;
  }

  const sec=(Date.now()-state.start)/1000;
  const add=sec*(state.perMinute/60);

  return {
    daily:state.daily+add,
    monthly:state.monthly+add,
    total:state.total+add
  };
}

function updateUI(){

  const c=getCounts();

  document.getElementById('daily').innerText=Math.floor(c.daily);
  document.getElementById('monthly').innerText=Math.floor(c.monthly);
  document.getElementById('total').innerText=Math.floor(c.total);

  if(state.start){
    document.getElementById('startTime').innerText=
      new Date(state.start).toLocaleString('ja-JP');
  }

  const goal=Number(document.getElementById('goal').value||1);
  const percent=Math.min(100,Math.floor(c.daily/goal*100));

  document.getElementById('percent').innerText=percent;
  document.getElementById('fill').style.width=percent+'%';

  checkDailyGoal(c);
  checkAchievements(c.total);
}

function toggleCounter(){

  state.perMinute=Number(document.getElementById('perMinute').value||60);

  if(!state.running){
    state.running=true;
    state.start=Date.now();

    document.getElementById('statusText').innerText='カウント中';
    document.getElementById('statusText').className='running';
    document.getElementById('startButton').innerText='⏹ 停止';

  }else{

    const c=getCounts();
    state.daily=c.daily;
    state.monthly=c.monthly;
    state.total=c.total;

    state.running=false;

    document.getElementById('statusText').innerText='停止中';
    document.getElementById('statusText').className='stop';
    document.getElementById('startButton').innerText='▶ 自動開始';
  }

  save();
  updateUI();
}

function savePrayer(){
  localStorage.setItem('prayer',document.getElementById('prayer').value);
  alert("🙏 御祈念を保存しました");
}

document.getElementById('prayer').value=
localStorage.getItem('prayer')||'';

function checkDailyGoal(c){

  const goal=Number(document.getElementById('goal').value||1);

  if(!state.dailyAchieved && c.daily>=goal){

    state.dailyAchieved=true;
    save();

    const div=document.createElement('div');
    div.className='achievement big';
    div.innerHTML='🌅 1日目標達成お疲れ様です。自分を労わって明日からも頑張りましょう(^^)v';

    document.getElementById('achievementArea').prepend(div);
  }
}

function checkAchievements(total){

  let html='';

  if(total>=10000){
    html+=`<div class="achievement">🥁 大地：おめでとう～よくやったね☺</div>`;
  }
  if(total>=50000){
    html+=`<div class="achievement">🎀 葵：おめでとう～お疲れ様です(#^.^#)</div>`;
  }
  if(total>=100000){
    html+=`<div class="achievement">🎸 蓮：やったね(^^♪地道に進もう</div>`;
  }
  if(total>=200000){
    html+=`<div class="achievement">🎤 結衣：やった～私の歌で元気を送るね</div>`;
  }
  if(total>=500000){
    html+=`<div class="achievement">🎹 悠真：さすが～未来のリーダー</div>`;
  }
  if(total>=750000){
    html+=`<div class="achievement">✨ 美琴：あともう少しで100万遍</div>`;
  }
  if(total>=1000000){
    html+=`<div class="achievement big">🏆 全員：100万遍達成おめでとう！</div>`;
  }

  document.getElementById('achievementArea').innerHTML=html;
}

function resetDay(){state.daily=0;state.dailyAchieved=false;save();updateUI();}
function resetMonth(){state.monthly=0;save();updateUI();}
function resetTotal(){state.total=0;save();updateUI();}

setInterval(()=>{
  document.getElementById('clock').innerText=
  new Date().toLocaleString('ja-JP');
  updateUI();
},1000);

updateUI();

</script>

</body>
</html>
